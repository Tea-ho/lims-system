# 서버 설정
server:
  port: 8089
  address: 0.0.0.0
  error:
    whitelabel:
      enabled: false
    path: /error
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# Spring 설정
spring:
  profiles:
    active: local
  application:
    name: LIMS_STUDY
  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp
  jackson:
    time-zone: Asia/Seoul
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# MyBatis 설정
mybatis:
  mapper-locations: classpath:mappers/**/*.xml
  type-aliases-package: com.lims.lims_study.domain.*.model
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30
    # Enum 타입 핸들러 설정
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler
    # SQL 로그 출력
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  type-handlers-package: com.lims.lims_study.handler

# 로깅 설정 (Universal Logger가 SQL 로깅 처리)
logging:
  level:
    root: INFO
    com.lims.lims_study: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO

# JWT 설정
jwt:
  secret: ${JWT_SECRET:mySecretKeyForJwtTokenGenerationThatShouldBeLongEnoughForHS512AlgorithmWithAtLeast512BitsOfSecurityRequirement}
  expiration: 86400000  # 24시간 (밀리초)

# Universal Logger 설정
universal-logger:
  log-path: C:/log
  config-path: config/universal-logger.yml
  sql-capture:
    enabled: true
  auto-init: true

# 관리자 설정
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

# 개발 환경별 설정
---
spring:
  profiles: local

# 서버 설정 (local 환경)
server:
  port: 8089

# 데이터베이스 설정
datasource:
  url: jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
  driver-class-name: org.h2.Driver
  username: sa
  password:
  hikari:
    connection-init-sql: SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci
h2:
  console:
    enabled: true

---
spring:
  profiles: prod
logging:
  level:
    root: WARN
    com.lims.lims_study: INFO
