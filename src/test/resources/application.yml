# 테스트 환경용 기본 설정
logging:
  level:
    root: WARN
    com.lims.lims_study: INFO
    org.springframework: WARN
    org.springframework.security: WARN

# JWT 설정
jwt:
  secret: testSecretKeyForJwtTokenGenerationThatShouldBeLongEnoughForTesting123456789
  expiration: 86400000

# 데이터베이스 설정 (테스트용)
spring:
  main:
    banner-mode: off
  
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: false
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    
  security:
    user:
      name: user
      password: password
      roles: USER
